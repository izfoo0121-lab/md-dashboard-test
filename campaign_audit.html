<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
  <title>Campaign Audit — MIRACLE-奇迹 MD</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0e0e12;--surface:#16161c;--card:#1c1c24;--border:rgba(255,255,255,.08);
      --text:#e8e6f0;--muted:#6a687a;--accent:#c8381a;--green:#3ddc84;
      --blue:#4da6ff;--gold:#f0c040;--purple:#a78bfa;--red:#ff5f5f;
      --display:'Bebas Neue',sans-serif;--body:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;padding-bottom:80px;}

    /* Header */
    .hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px;position:sticky;top:0;z-index:100;}
    .hdr-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
    .hdr-title{font-family:var(--display);font-size:28px;letter-spacing:.06em;}
    .hdr-sub{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
    .nav-pills{display:flex;gap:6px;flex-wrap:wrap;}
    .nav-pill{font-family:var(--mono);font-size:9px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--muted);text-decoration:none;}
    .nav-pill:hover{border-color:var(--blue);color:var(--blue);}

    /* Controls */
    .controls{padding:12px 18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--card);border-bottom:1px solid var(--border);}
    .ctrl-label{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;}
    select{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px;padding:7px 12px;border-radius:8px;cursor:pointer;}
    select:focus{outline:none;border-color:var(--blue);}

    /* Campaign type tabs */
    .camp-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;}
    .camp-tab{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding:10px 14px;border:none;background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;}
    .camp-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

    /* Body */
    .page-body{padding:14px 18px;max-width:900px;margin:0 auto;}

    /* Summary row */
    .summary-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
    .sum-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;flex:1;min-width:120px;}
    .sum-val{font-family:var(--display);font-size:28px;letter-spacing:.04em;}
    .sum-val.g{color:var(--green);}
    .sum-val.a{color:var(--gold);}
    .sum-val.r{color:var(--red);}
    .sum-val.b{color:var(--blue);}
    .sum-lbl{font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}

    /* Agent section */
    .agent-section{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
    .agent-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;}
    .agent-hdr:hover{background:rgba(255,255,255,.02);}
    .agent-name{font-family:var(--display);font-size:20px;letter-spacing:.05em;}
    .agent-stats{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
    .stat-chip{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:10px;}
    .stat-chip.done{background:rgba(61,220,132,.15);color:var(--green);border:1px solid rgba(61,220,132,.25);}
    .stat-chip.pending{background:rgba(106,104,122,.1);color:var(--muted);border:1px solid var(--border);}
    .stat-chip.pct{background:rgba(77,166,255,.12);color:var(--blue);border:1px solid rgba(77,166,255,.2);}

    /* Progress bar */
    .prog-bar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin:0 14px 8px;}
    .prog-fill{height:100%;border-radius:2px;transition:width .4s;}

    /* Claim rows */
    .claims-body{padding:6px 10px 10px;}
    .claim-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:10px;margin-bottom:4px;background:rgba(255,255,255,.02);border:1px solid transparent;}
    .claim-row.claimed{background:rgba(61,220,132,.04);border-color:rgba(61,220,132,.12);}
    .claim-row.pending{background:rgba(255,255,255,.02);}
    .claim-row.unclaimed{background:rgba(255,255,255,.015);border-color:rgba(255,255,255,.06);opacity:.82;}
    .claim-row.verified{background:rgba(77,166,255,.05);border-color:rgba(77,166,255,.15);}
    .claim-row.rejected{background:rgba(255,95,95,.05);border-color:rgba(255,95,95,.15);}
    .claim-row.excluded{background:rgba(255,136,102,.05);border-color:rgba(255,136,102,.2);opacity:.7;}
    .claim-info{flex:1;min-width:0;}
    .claim-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .claim-code{font-family:var(--mono);font-size:9px;color:var(--muted);}
    .claim-meta{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:1px;}
    .claim-actions{display:flex;gap:6px;align-items:center;margin-left:10px;flex-shrink:0;}
    .claim-status{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:8px;}
    .claim-status.pending{color:var(--muted);background:rgba(255,255,255,.06);}
    .claim-status.unclaimed{color:var(--muted);background:rgba(255,255,255,.045);}
    .claim-status.claimed{color:var(--green);background:rgba(61,220,132,.12);}
    .claim-status.verified{color:var(--blue);background:rgba(77,166,255,.12);}
    .claim-status.rejected{color:var(--red);background:rgba(255,95,95,.12);}
    .claim-status.excluded{color:#ff8866;background:rgba(255,136,102,.12);}
    .audit-btn{font-family:var(--mono);font-size:9px;padding:4px 10px;border-radius:8px;border:1px solid;cursor:pointer;background:transparent;transition:all .15s;}
    .audit-btn.verify{color:var(--green);border-color:rgba(61,220,132,.4);}
    .audit-btn.verify:hover{background:rgba(61,220,132,.15);}
    .audit-btn.reject{color:var(--red);border-color:rgba(255,95,95,.3);}
    .audit-btn.reject:hover{background:rgba(255,95,95,.12);}
    .audit-btn.undo{color:var(--muted);border-color:var(--border);}
    .audit-btn.undo:hover{color:var(--text);}

    /* Collapsed */
    .agent-section.is-collapsed .claims-body,.agent-section.is-collapsed .prog-bar{display:none;}
    .agent-section.is-collapsed .agent-hdr{border-bottom:0;}
    .agent-toggle{font-family:var(--mono);font-size:10px;color:var(--muted);min-width:18px;text-align:center;}
    .audit-mini-btn{font-family:var(--mono);font-size:10px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;}
    .audit-mini-btn:hover{color:var(--text);border-color:rgba(255,255,255,.25);}

    /* Empty */
    .empty{text-align:center;padding:40px 20px;color:var(--muted);font-family:var(--mono);font-size:11px;}

    /* Toast */
    .toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#0e0e12;font-family:var(--mono);font-size:11px;font-weight:600;padding:10px 20px;border-radius:12px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none;}
    .toast.show{opacity:1;}

    /* Export btn */
    .export-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:10px;padding:7px 14px;border-radius:8px;cursor:pointer;}
    .export-btn:hover{border-color:var(--blue);color:var(--blue);}

    @media(max-width:480px){
      .page-body{padding:10px 12px;}
      .summary-row{gap:8px;}
      .sum-card{min-width:90px;}
    }

    @media print {
      header, nav, .nav, .nav-pills, .camp-tabs, .controls, button, .login-overlay,
      .pin-overlay, .filter-chip, .export-btn, #login-gate, #toast {
        display: none !important;
      }

      body {
        background: white !important;
        color: black !important;
      }

      body.print-mode-audit * {
        visibility: hidden !important;
      }

      body.print-mode-audit #audit-content,
      body.print-mode-audit #audit-content * {
        visibility: visible !important;
        color: black !important;
        background: white !important;
        border-color: #ccc !important;
      }

      body.print-mode-audit #audit-content {
        position: absolute !important;
        left: 0 !important;
        top: 0 !important;
        width: 100% !important;
      }

      @page {
        margin: 1cm;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<script>
// Audit page passwords
const AUDIT_PASSWORDS = ['touro2026', 'accounts2026'];  // admin or accounts dept

function auditLogin() {
  const pw = document.getElementById('audit-pw').value;
  if (AUDIT_PASSWORDS.includes(pw)) {
    document.getElementById('login-gate').style.display = 'none';
    sessionStorage.setItem('audit_auth', '1');
    if (typeof populateAuditMonthDropdown === 'function') populateAuditMonthDropdown();
    loadAuditData();
  } else {
    document.getElementById('audit-pw-err').style.display = 'block';
    document.getElementById('audit-pw').value = '';
    document.getElementById('audit-pw').focus();
  }
}

// Auto-bypass if already authenticated this session
window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('audit_auth') === '1') {
    document.getElementById('login-gate').style.display = 'none';
    if (typeof populateAuditMonthDropdown === 'function') populateAuditMonthDropdown();
    loadAuditData();
  } else {
    setTimeout(() => document.getElementById('audit-pw')?.focus(), 100);
  }
});
</script>

<script>
const AGENTS = ['BEN','CJ','JACKY','JAMES','JW','KEAN','KEE','KF','KI-MI','KW','LEON','NMK','SAM','XIAN','YI'];
const CAMP_EMOJI = {free_sample:'🎁',foc_sample:'🎁',birthday_gift:'🎂',promotion:'📢',festive_gift:'🧧',voucher:'🎟️',conversion_tiered:'🎯',conversion_simple:'🎯',other:'📋'};
const CAMP_LABEL = {free_sample:'FOC Sample',foc_sample:'FOC Sample',birthday_gift:'Birthday Gift',promotion:'Brand Promo',festive_gift:'Festive Gift',conversion_tiered:'Conversion',conversion_simple:'Conversion',other:'Other'};

let DASH_DATA  = null;   // current month data
let CAMP_DATA  = null;   // campaigns.json
let activeCampId = 'ALL';
let _lastAuditExport = null;  // populated by render functions, consumed by export

// Supabase config (same as admin / sales_dashboard)
const SUPABASE_URL = 'https://rqitgmydcbyiygqjssrb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8xb7ZaHyr3OF3WNEqufuDg_67spOIFw';

// In-memory caches populated from Supabase on load
// Key format: `${agent}|${campId}|${debtorCode}`
let CLAIMS_CACHE = {};  // value: claim row from Supabase
let AUDIT_CACHE  = {};  // value: audit row derived from claim.status

// Mirrors process_data.py's _campaign_active_in_month and the JS helper
// already in sales_dashboard.html. Returns true if a campaign was active
// (started before/in monthStr AND not yet ended by monthStr's start) for
// a given month string like "May 26".
function isCampaignActiveInMonth(camp, monthStr) {
  if (!monthStr) return true;
  const MONTHS_C = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const today = new Date().toISOString().slice(0, 7);
  const start = camp.start_date || camp.created_at || '';
  const deadline = camp.deadline || '';

  // Real-world start gate: a campaign that hasn't started yet in real time
  // shouldn't appear regardless of which month is selected.
  if (start && start.slice(0,7) > today) return false;

  // Selected month gate: campaign must have started by this month and
  // must not have ended before the selected month begins.
  const parts = monthStr.split(' ');
  if (parts.length === 2) {
    const m = MONTHS_C.indexOf(parts[0]) + 1;
    const y = 2000 + parseInt(parts[1]);
    if (m && y) {
      const monthIso = `${y}-${String(m).padStart(2,'0')}`;
      if (start && start.slice(0,7) > monthIso) return false;
      if (deadline && deadline.slice(0,7) < monthIso) return false;
    }
  }
  return true;
}

// Populate month-select with a rolling range of months.
// Generates options from Jan 26 through (current real-world month + 6).
// Default-selects current real-world month if available, otherwise latest.
// Mirrors the admin.html pattern (commit 738a40a / 5cfadda).
function populateAuditMonthDropdown() {
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const START_YEAR = 2026;
  const START_MONTH = 0;
  const FUTURE_BUFFER = 6;

  const today = new Date();
  const tYear = today.getFullYear();
  const tMonth = today.getMonth();

  const opts = [];
  let y = START_YEAR, m = START_MONTH;
  while (y < tYear || (y === tYear && m <= tMonth + FUTURE_BUFFER)) {
    opts.push(`${MONTHS[m]} ${String(y).slice(-2)}`);
    m++;
    if (m > 11) { m = 0; y++; }
    if (opts.length > 200) break;
  }

  const todayLabel = `${MONTHS[tMonth]} ${String(tYear).slice(-2)}`;
  const defaultSel = opts.includes(todayLabel) ? todayLabel : opts[opts.length - 1];

  const el = document.getElementById('month-select');
  if (!el) return;
  const previouslySelected = el.value;
  el.innerHTML = opts.map(o =>
    `<option value="${o}"${o === defaultSel ? ' selected' : ''}>${o}</option>`
  ).join('');
  if (previouslySelected && opts.includes(previouslySelected)) {
    el.value = previouslySelected;
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', populateAuditMonthDropdown);
} else {
  populateAuditMonthDropdown();
}

// ── Supabase fetch helpers ─────────────────────────────────────────────────
async function fetchAllClaimsForMonth(month) {
  // Fetch paginated — up to 5000 rows total (plenty for one month)
  const all = [];
  let offset = 0;
  while (offset < 5000) {
    const url = `${SUPABASE_URL}/rest/v1/claims?select=*&month=eq.${encodeURIComponent(month)}&order=ts.asc`;
    const r = await fetch(url, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Range': `${offset}-${offset+999}`
      }
    });
    if (!r.ok) { console.warn('[audit] fetch failed', r.status); break; }
    const batch = await r.json();
    if (!batch || !batch.length) break;
    all.push(...batch);
    if (batch.length < 1000) break;
    offset += 1000;
  }
  return all;
}

// Populate CLAIMS_CACHE and AUDIT_CACHE from Supabase rows
function indexSupabaseRows(rows) {
  CLAIMS_CACHE = {};
  AUDIT_CACHE = {};
  rows.forEach(r => {
    const key = `${r.agent}|${r.camp_id}|${(r.debtor_code||'').toUpperCase()}`;
    // Claim shape used by rest of this file
    CLAIMS_CACHE[key] = {
      ts: r.ts,
      count: 1,
      remark: r.remark || '',
      bulk: !!r.bulk,
      status: r.status,                      // raw status — needed for excluded filtering
      reason: r.reason || '',                // exclusion reason
    };
    // Audit shape derived from status
    if (r.status === 'verified') {
      AUDIT_CACHE[key] = { status: 'verified', ts: r.audit_ts || r.ts, by: r.audit_by || 'management' };
    } else if (r.status === 'rejected') {
      AUDIT_CACHE[key] = { status: 'rejected', ts: r.audit_ts || r.ts, by: r.audit_by || 'management', reason: r.audit_reason || '' };
    }
    // status === 'delivered' / 'claimed' → pending (no audit entry)
    // status === 'excluded' → agent-initiated exclusion, not a thing admin audits
  });
}

// ── Storage helpers (now backed by Supabase cache, not localStorage) ───────
function getClaimKey(month, agent, campId, debtorCode) {
  return `${agent}|${campId}|${(debtorCode||'').toUpperCase()}`;
}
function getClaim(month, agent, campId, debtorCode) {
  return CLAIMS_CACHE[getClaimKey(month, agent, campId, debtorCode)] || null;
}
function getAuditKey(month, agent, campId, debtorCode) {
  return `${agent}|${campId}|${(debtorCode||'').toUpperCase()}`;
}
function getAudit(month, agent, campId, debtorCode) {
  return AUDIT_CACHE[getAuditKey(month, agent, campId, debtorCode)] || null;
}

// Persist an audit decision to Supabase (UPDATE claims.status)
async function saveAudit(month, agent, campId, debtorCode, auditData) {
  const key = `${agent}|${campId}|${(debtorCode||'').toUpperCase()}`;

  // Update in-memory caches immediately (optimistic UI)
  if (auditData.status === 'undo' || auditData.status === null) {
    delete AUDIT_CACHE[key];
  } else {
    AUDIT_CACHE[key] = { ...auditData };
  }

  // Determine target status for Supabase
  let newStatus;
  if (!auditData.status || auditData.status === 'undo') newStatus = 'delivered';
  else if (auditData.status === 'verified') newStatus = 'verified';
  else if (auditData.status === 'rejected') newStatus = 'rejected';
  else newStatus = 'delivered';

  // Build body — only send columns that are certain to exist.
  // Audit metadata is optional (column may not exist yet).
  // Core signal: status. Always include.
  const body = { status: newStatus };
  // Optional: include audit metadata if columns exist (will be silently dropped if not)
  if (auditData.ts) body.audit_ts = auditData.ts;
  if (auditData.by) body.audit_by = auditData.by;
  if (auditData.reason) body.audit_reason = auditData.reason;

  const url = `${SUPABASE_URL}/rest/v1/claims`
    + `?month=eq.${encodeURIComponent(month)}`
    + `&agent=eq.${encodeURIComponent(agent)}`
    + `&camp_id=eq.${encodeURIComponent(campId)}`
    + `&debtor_code=eq.${encodeURIComponent(debtorCode)}`;

  try {
    let r = await fetch(url, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(body)
    });
    // If audit columns don't exist, retry with status only
    if (!r.ok && (body.audit_ts || body.audit_by || body.audit_reason)) {
      console.warn('[audit] retrying with status-only (audit columns may not exist)');
      r = await fetch(url, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ status: newStatus })
      });
    }
    if (!r.ok) {
      const err = await r.text();
      console.warn('[audit] Supabase update failed', r.status, err);
      showToast(`✗ Save failed: ${r.status}`);
      return false;
    }
    return true;
  } catch(e) {
    console.warn('[audit] Supabase error', e);
    showToast('✗ Network error');
    return false;
  }
}

// ── Load data ─────────────────────────────────────────────────────────────
async function loadAuditData() {
  const month = document.getElementById('month-select').value;
  const slug  = month.toLowerCase().replace(' ','');

  // Show loading state
  document.getElementById('audit-content').innerHTML = '<div class="empty">⏳ Loading from Supabase...</div>';

  try {
    const r = await fetch(`data_${slug}.json?v=${Date.now()}`);
    if (!r.ok) throw new Error(`data_${slug}.json ${r.status}`);
    DASH_DATA = await r.json();
  } catch(e) {
    // Future/current audit months may not have a data_<month>.json yet.
    // Fall back to dashboard_data.json, which carries birthday_by_month.
    try {
      const fallback = await fetch(`dashboard_data.json?v=${Date.now()}`);
      if (!fallback.ok) throw new Error(`dashboard_data.json ${fallback.status}`);
      DASH_DATA = await fallback.json();
    } catch(e2) {
      DASH_DATA = null;
    }
  }
  try {
    const r2 = await fetch(`campaigns.json?v=${Date.now()}`);
    CAMP_DATA = await r2.json();
  } catch(e) { CAMP_DATA = null; }

  // If the previously-selected campaign tab is no longer valid for this
  // month, reset to ALL so the UI shows something rather than nothing.
  if (activeCampId !== 'ALL' && activeCampId !== 'BDAY_LIST') {
    const stillActive = (CAMP_DATA?.campaigns || [])
      .some(c => c.id === activeCampId && c.active && isCampaignActiveInMonth(c, month));
    if (!stillActive) {
      activeCampId = 'ALL';
    }
  }

  // Pull claims + audit state from Supabase
  try {
    const rows = await fetchAllClaimsForMonth(month);
    indexSupabaseRows(rows);
    console.log(`[audit] Loaded ${rows.length} Supabase claims for ${month}`);
  } catch(e) {
    console.warn('[audit] Failed to load Supabase claims', e);
    CLAIMS_CACHE = {};
    AUDIT_CACHE = {};
  }

  buildCampTabs();
  renderAudit();
}

// ── Campaign tabs ──────────────────────────────────────────────────────────
function buildCampTabs() {
  const currentMonth = document.getElementById('month-select')?.value || '';
  const camps = (CAMP_DATA?.campaigns || [])
    .filter(c => c.active && c.id !== 'birthday_gift_auto')
    .filter(c => isCampaignActiveInMonth(c, currentMonth));
  const tabs  = document.getElementById('camp-tabs');
  tabs.innerHTML = `<button class="camp-tab ${activeCampId==='ALL'?'active':''}" onclick="switchCamp('ALL',this)">ALL</button>`
    + `<button class="camp-tab ${activeCampId==='BDAY_LIST'?'active':''}" onclick="switchCamp('BDAY_LIST',this)">🎂 Birthday List</button>`
    + camps.map(c => `<button class="camp-tab ${activeCampId===c.id?'active':''}" onclick="switchCamp('${c.id}',this)">${CAMP_EMOJI[c.type]||'📋'} ${c.name}</button>`).join('');
}

function switchCamp(id, btn) {
  activeCampId = id;
  document.querySelectorAll('.camp-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAudit();
}

// ── Main render ────────────────────────────────────────────────────────────
// Driven by Supabase claims (CLAIMS_CACHE). Shows ALL claims that exist,
// including bulk-imported ones, not just pre-assigned campaign entries.
function renderAudit() {
  const month     = document.getElementById('month-select').value;
  const agentSel  = document.getElementById('agent-select').value;
  const allCamps  = (CAMP_DATA?.campaigns||[]);
  const isConversionCamp = camp => camp?.type === 'conversion_tiered' || camp?.type === 'conversion_simple';

  if (activeCampId === 'BDAY_LIST') {
    renderBirthdayDebtorList(month, agentSel);
    return;
  }

  // Build a lookup of debtor_code → debtor object (per agent)
  // so we can show company names
  const debtorByAgentCode = {};
  AGENTS.forEach(a => {
    const list = DASH_DATA?.agents?.[a]?.debtor_cards?.debtors || [];
    list.forEach(d => {
      debtorByAgentCode[`${a}|${(d.debtor_code||'').toUpperCase()}`] = d;
    });
  });

  // Build records from CLAIMS_CACHE (Supabase)
  const records = [];
  const seen = new Set();
  Object.entries(CLAIMS_CACHE).forEach(([key, claim]) => {
    const [agent, campId, debtorCode] = key.split('|');
    if (agentSel !== 'ALL' && agent !== agentSel) return;
    if (activeCampId !== 'ALL' && campId !== activeCampId) return;
    seen.add(`${agent}|${campId}|${debtorCode}`);

    const camp = allCamps.find(c => c.id === campId)
      || (campId === 'birthday_gift_auto'
        ? { id:campId, name:'Birthday Gift', type:'birthday_gift' }
        : { id:campId, name:campId, type:'other' });
    const debtor = debtorByAgentCode[`${agent}|${debtorCode}`] || {
      debtor_code: debtorCode,
      company_name: debtorCode,
      campaigns: []
    };
    // campEntry is the one entry in debtor.campaigns that matches this campId (for CAT info)
    const campEntry = (debtor.campaigns||[]).find(c => c.id === campId) || {};

    const audit = getAudit(month, agent, campId, debtorCode);
    records.push({ camp, agent, debtor, campEntry, claim, audit });
  });

  // Show full entitlement/enrollment lists, even before agents mark claimed.
  // In ALL mode this includes every active campaign for the month.
  const entitlementCamps = activeCampId === 'ALL'
    ? allCamps.filter(c => c.active && c.id !== 'birthday_gift_auto' && isCampaignActiveInMonth(c, month))
    : [allCamps.find(c => c.id === activeCampId) || { id:activeCampId, name:activeCampId, type:'other' }];

  entitlementCamps.forEach(selectedCamp => {
    Object.entries(debtorByAgentCode).forEach(([lookupKey, debtor]) => {
      const [agent, debtorCode] = lookupKey.split('|');
      if (agentSel !== 'ALL' && agent !== agentSel) return;
      const campEntry = (debtor.campaigns || []).find(c => c.id === selectedCamp.id);
      if (!campEntry) return;
      const recordKey = `${agent}|${selectedCamp.id}|${debtorCode}`;
      if (seen.has(recordKey)) return;
      records.push({
        camp: selectedCamp,
        agent,
        debtor,
        campEntry,
        claim: null,
        audit: null
      });
    });
  });

  // Sort by agent first so the audit list is easy to work through by salesman.
  records.sort((a, b) => {
    const rank = r => (!r.audit ? 0 : r.audit.status === 'verified' ? 1 : 2);
    const ra = rank(a), rb = rank(b);
    const ca = isConversionCamp(a.camp) && a.campEntry?.converted ? 0 : 1;
    const cb = isConversionCamp(b.camp) && b.campEntry?.converted ? 0 : 1;
    return (a.agent || 'ZZZ').localeCompare(b.agent || 'ZZZ') ||
      (ca - cb) ||
      (ra - rb) ||
      String(a.debtor?.company_name || '').localeCompare(String(b.debtor?.company_name || '')) ||
      String(a.debtor?.debtor_code || '').localeCompare(String(b.debtor?.debtor_code || ''));
  });

  // Summary
  const total    = records.length;
  const claimed  = records.filter(r=>!!r.claim).length;
  const verified = records.filter(r=>r.audit?.status==='verified').length;
  const rejected = records.filter(r=>r.audit?.status==='rejected').length;
  const excluded = records.filter(r=>r.claim?.status==='excluded').length;
  const pending  = claimed - verified - rejected - excluded;
  const unclaimed = total - claimed;
  const converted = records.filter(r=>isConversionCamp(r.camp) && r.campEntry?.converted).length;
  const showConvertedSummary = activeCampId !== 'ALL' && records.some(r=>isConversionCamp(r.camp));
  const pct      = total > 0 ? Math.round(claimed/total*100) : 0;
  const rowsForExport = records.map(r => {
    const isExcluded = r.claim?.status === 'excluded';
    const exportStatus = isConversionCamp(r.camp)
      ? (r.campEntry?.converted ? 'converted' : 'not_converted')
      : (!r.claim ? 'not_claimed' : (isExcluded ? 'excluded' : (r.audit?.status || 'pending')));
    return {
      camp_id: r.camp.id || '',
      camp_name: r.camp.name || r.camp.id || '',
      debtor_code: r.debtor.debtor_code || '',
      debtor_name: r.debtor.company_name || r.debtor.debtor_code || '',
      agent: r.agent || '',
      status: exportStatus,
      claimed_at: r.claim?.ts || '',
      verified_by: r.audit?.by || r.audit?.auditor || '',
      remark: isExcluded ? (r.claim?.reason || r.claim?.remark || '') : (r.claim?.remark || r.audit?.reason || ''),
    };
  });

  // Bridge: capture export state for regular audit views
  _lastAuditExport = {
    mode: 'audit',
    campId: activeCampId,
    month,
    agent: agentSel,
    rows: rowsForExport,
  };

  document.getElementById('summary-row').innerHTML = `
    <div class="sum-card"><div class="sum-val b">${total}</div><div class="sum-lbl">${activeCampId === 'ALL' ? 'Total Records' : 'Entitled'}</div></div>
    <div class="sum-card"><div class="sum-val g">${showConvertedSummary ? converted : claimed}</div><div class="sum-lbl">${showConvertedSummary ? 'Converted' : 'Submitted'}</div></div>
    <div class="sum-card"><div class="sum-val b">${verified}</div><div class="sum-lbl">Verified ✓</div></div>
    <div class="sum-card"><div class="sum-val r">${rejected}</div><div class="sum-lbl">Rejected ✗</div></div>
    <div class="sum-card"><div class="sum-val a">${showConvertedSummary ? total - converted : (activeCampId === 'ALL' ? pending : unclaimed)}</div><div class="sum-lbl">${showConvertedSummary ? 'Not Converted' : (activeCampId === 'ALL' ? 'Pending Audit' : 'Not Claimed')}</div></div>`;

  if (!records.length) {
    document.getElementById('audit-content').innerHTML = `<div class="empty">No ${activeCampId==='ALL'?'claims':'campaign debtors'} for ${month}${activeCampId!=='ALL'?' in this campaign':''}</div>`;
    return;
  }

  // Group by agent
  const byAgent = {};
  records.forEach(r => {
    if (!byAgent[r.agent]) byAgent[r.agent] = [];
    byAgent[r.agent].push(r);
  });

  document.getElementById('audit-content').innerHTML = Object.entries(byAgent).map(([agent, recs]) => {
    const agentClaimed  = recs.filter(r=>!!r.claim).length;
    const agentVerified = recs.filter(r=>r.audit?.status==='verified').length;
    const agentRejected = recs.filter(r=>r.audit?.status==='rejected').length;
    const agentExcluded = recs.filter(r=>r.claim?.status==='excluded').length;
    const agentPending  = agentClaimed - agentVerified - agentRejected - agentExcluded;
    const agentUnclaimed = recs.length - agentClaimed;
    const agentConverted = recs.filter(r=>isConversionCamp(r.camp) && r.campEntry?.converted).length;
    const agentShowsConversion = recs.some(r=>isConversionCamp(r.camp));
    const conversionPct = recs.length > 0 ? Math.round(agentConverted/recs.length*100) : 0;
    // Progress is computed only over non-excluded claims (excluded are out-of-scope for admin)
    const progressDenom = agentClaimed - agentExcluded;
    const agentPct      = progressDenom > 0 ? Math.round((agentVerified+agentRejected)/progressDenom*100) : 0;
    const progColor     = agentPct>=80?'var(--green)':agentPct>=50?'var(--gold)':'var(--red)';

    const rows = recs.map(r => {
      const isExcluded = r.claim?.status === 'excluded';
      const isConversion = isConversionCamp(r.camp);
      const isConverted = isConversion && !!r.campEntry?.converted;
      const statusLabel = isConversion                        ? (isConverted ? '✓ Converted' : 'Not converted')
                        : !r.claim                           ? 'Not claimed'
                        : isExcluded                         ? '🚫 Excluded'
                        : r.audit?.status === 'verified'     ? '✓ Verified'
                        : r.audit?.status === 'rejected'     ? '✗ Rejected'
                        : '● Pending';
      const statusClass = isConversion ? (isConverted ? 'claimed' : 'unclaimed') : (!r.claim ? 'unclaimed' : (isExcluded ? 'excluded' : (r.audit?.status || 'claimed')));
      const isFOC = r.camp.type==='foc_sample'||r.camp.type==='festive_gift'||r.camp.type==='birthday_gift';
      const actionLabel = isConversion ? (isConverted ? 'Converted' : 'Not converted') : (!r.claim ? 'Not submitted' : (isExcluded ? 'Unable to deliver' : (isFOC ? 'Delivered' : 'Claimed')));
      const conversionMeta = isConversion ? `Feb-Apr: ${r.campEntry?.lookback_ctn ?? 0} CTN · May: ${r.campEntry?.current_ctn ?? 0} CTN` : '';
      // Reason label lookup (same as sales_dashboard)
      const reasonMap = {closed:'Shop Closed',unreachable:'Unreachable',moved:'Moved',refused:'Refused',other:'Other'};
      const reasonText = isExcluded ? (reasonMap[r.claim?.reason] || r.claim?.reason || 'No reason') : '';

      return `<div class="claim-row ${statusClass}" id="row-${agent}-${r.camp.id}-${r.debtor.debtor_code}">
        <div class="claim-info">
          <div class="claim-name">${r.debtor.company_name||r.debtor.debtor_code}</div>
          <div class="claim-code">${r.debtor.debtor_code} · ${CAMP_EMOJI[r.camp.type]||'📋'} ${r.camp.name}${r.campEntry.cat?' · CAT '+r.campEntry.cat:''}${r.claim?.bulk?' · 📥 Bulk':''}</div>
          <div class="claim-meta">
            ${isConversion ? conversionMeta : `${actionLabel}: ${r.claim?.ts||'—'}`}${isExcluded ? ` · <span style="color:#ff8866;">${reasonText}</span>` : ''}${r.claim?.remark?' · "'+r.claim.remark+'"':''}
            ${r.audit?.status==='verified'?` · ✓ Verified ${r.audit.ts||''}`:r.audit?.status==='rejected'?` · ✗ Rejected: ${r.audit.reason||''}${r.audit.ts?' · '+r.audit.ts:''}` : ''}
          </div>
        </div>
        <div class="claim-actions">
          <span class="claim-status ${statusClass}">${statusLabel}</span>
          ${!r.claim || isExcluded ? '' : (!r.audit ? `
            <button class="audit-btn verify" onclick="auditClaim('${month}','${agent}','${r.camp.id}','${r.debtor.debtor_code}','verified')">✓</button>
            <button class="audit-btn reject" onclick="promptReject('${month}','${agent}','${r.camp.id}','${r.debtor.debtor_code}')">✗</button>
          ` : `
            <button class="audit-btn undo" onclick="auditClaim('${month}','${agent}','${r.camp.id}','${r.debtor.debtor_code}','undo')">Undo</button>
          `)}
        </div>
      </div>`;
    }).join('');

    return `<div class="agent-section is-collapsed">
      <div class="agent-hdr" onclick="toggleAgentSection(this)">
        <div class="agent-name">${agent}</div>
        <div class="agent-stats">
          <span class="stat-chip pct">${agentShowsConversion ? `${conversionPct}% converted` : `${agentPct}% audited`}</span>
          <span class="stat-chip done">${agentShowsConversion ? `${agentConverted}/${recs.length} converted` : `${agentClaimed}/${recs.length} claimed`}</span>
          ${!agentShowsConversion && agentPending>0?`<span class="stat-chip pending">${agentPending} pending</span>`:''}
          ${agentShowsConversion && recs.length-agentConverted>0?`<span class="stat-chip pending">${recs.length-agentConverted} not converted</span>`:''}
          ${!agentShowsConversion && agentUnclaimed>0?`<span class="stat-chip pending">${agentUnclaimed} not claimed</span>`:''}
          ${agentVerified>0?`<span style="font-family:var(--mono);font-size:9px;color:var(--blue);">✓${agentVerified}</span>`:''}
          ${agentRejected>0?`<span style="font-family:var(--mono);font-size:9px;color:var(--red);">✗${agentRejected}</span>`:''}
          ${agentExcluded>0?`<span style="font-family:var(--mono);font-size:9px;color:#ff8866;">🚫${agentExcluded}</span>`:''}
          <button onclick="event.stopPropagation();bulkApproveAgent('${agent}')"
            style="background:rgba(61,220,132,.12);border:1px solid rgba(61,220,132,.3);color:var(--green);font-family:var(--mono);font-size:9px;padding:4px 10px;border-radius:6px;cursor:pointer;margin-left:6px;">
            ✓ Approve all ${agent}
          </button>
          <span class="agent-toggle">▸</span>
        </div>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${agentShowsConversion ? conversionPct : agentPct}%;background:${agentShowsConversion ? 'var(--green)' : progColor};"></div></div>
      <div class="claims-body" id="claims-${agent}">${rows}</div>
    </div>`;
  }).join('');
}

// ── Birthday debtor list management ────────────────────────────────────────
function auditMonthToIso(month) {
  const [mon, yy] = String(month || '').split(' ');
  const idx = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].indexOf(mon);
  if (idx < 0) return '';
  return `${2000 + parseInt(yy || '0', 10)}-${String(idx + 1).padStart(2, '0')}`;
}

function auditBirthdayMonthLabel(month) {
  const [mon, yy] = String(month || '').split(' ');
  return `${mon || ''} ${2000 + parseInt(yy || '0', 10)}`.trim();
}

function auditHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function auditJs(s) {
  return String(s ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function buildAuditDebtorLookup() {
  const byCode = {};
  AGENTS.forEach(agent => {
    const list = DASH_DATA?.agents?.[agent]?.debtor_cards?.debtors || [];
    list.forEach(d => {
      const code = (d.debtor_code || '').toUpperCase();
      if (!code) return;
      byCode[code] = {
        code,
        name: d.company_name || d.name || code,
        agent,
        type: d.debtor_type || '',
        phone: d.phone || d.mobile || d.contact || ''
      };
    });
  });
  return byCode;
}

async function fetchBirthdayOverridesForMonth(month) {
  const iso = auditMonthToIso(month);
  if (!iso) return {};
  const url = `${SUPABASE_URL}/rest/v1/targets_birthday_overrides?select=debtor_code,action&month=eq.${encodeURIComponent(iso)}`;
  try {
    const r = await fetch(url, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    if (!r.ok) throw new Error(`Supabase ${r.status}`);
    const rows = await r.json();
    const out = {};
    rows.forEach(row => {
      const code = (row.debtor_code || '').toUpperCase();
      if (code && (row.action === 'add' || row.action === 'remove')) out[code] = row.action;
    });
    return out;
  } catch (e) {
    console.warn('[birthday-audit] override fetch failed', e);
    showToast('Birthday override fetch failed');
    return {};
  }
}

async function saveBirthdayOverride(month, code, action) {
  const iso = auditMonthToIso(month);
  const cleanCode = String(code || '').trim().toUpperCase();
  if (!iso || !cleanCode || !['add','remove'].includes(action)) return false;
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/targets_birthday_overrides?on_conflict=month,debtor_code`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=minimal'
      },
      body: JSON.stringify({
        month: iso,
        debtor_code: cleanCode,
        action,
        birth_date: action
      })
    });
    if (!r.ok) throw new Error(await r.text());
    return true;
  } catch (e) {
    console.warn('[birthday-audit] override save failed', e);
    showToast('Birthday override save failed');
    return false;
  }
}

async function birthdayAuditRemove(month, code) {
  if (!confirm(`Remove ${code} from this month's birthday list?`)) return;
  if (await saveBirthdayOverride(month, code, 'remove')) {
    showToast('Birthday debtor removed');
    renderBirthdayDebtorList(month, document.getElementById('agent-select').value);
  }
}

async function birthdayAuditAdd(month, presetCode) {
  const raw = presetCode || prompt('Debtor code to add to this month birthday list:');
  const code = String(raw || '').trim().toUpperCase();
  if (!code) return;
  if (await saveBirthdayOverride(month, code, 'add')) {
    showToast('Birthday debtor added');
    renderBirthdayDebtorList(month, document.getElementById('agent-select').value);
  }
}

async function renderBirthdayDebtorList(month, agentSel) {
  const contentEl = document.getElementById('audit-content');
  const summaryEl = document.getElementById('summary-row');
  contentEl.innerHTML = '<div class="empty">⏳ Loading birthday list...</div>';

  const overrides = await fetchBirthdayOverridesForMonth(month);
  const lookup = buildAuditDebtorLookup();
  // Read per-month birthday list for the selected month, with backward-compat fallback
  const monthList = DASH_DATA?.birthday_by_month?.[month]?.debtors
                 ?? DASH_DATA?.birthday_campaign?.debtors
                 ?? [];
  const finalRows = monthList.map(d => {
    const code = (d.code || d.debtor_code || '').toUpperCase();
    const fallback = lookup[code] || {};
    return {
      code,
      name: d.name || d.company_name || fallback.name || code,
      agent: d.agent || fallback.agent || '',
      type: d.type || d.debtor_type || fallback.type || '',
      phone: d.phone || fallback.phone || '',
      source: d.source || 'auto',
      status: d.source === 'manual' ? 'added' : 'auto'
    };
  }).filter(d => d.code);

  const visibleCodes = new Set(finalRows.map(d => d.code));
  const removedRows = Object.entries(overrides)
    .filter(([code, action]) => action === 'remove' && !visibleCodes.has(code))
    .map(([code]) => {
      const d = lookup[code] || {};
      return {
        code,
        name: d.name || code,
        agent: d.agent || '',
        type: d.type || '',
        phone: d.phone || '',
        source: 'override',
        status: 'removed'
      };
    });

  const allRows = [...finalRows, ...removedRows]
    .filter(d => agentSel === 'ALL' || d.agent === agentSel)
    .sort((a, b) =>
      (a.agent || 'ZZZ').localeCompare(b.agent || 'ZZZ') ||
      (a.name || '').localeCompare(b.name || '') ||
      a.code.localeCompare(b.code) ||
      a.status.localeCompare(b.status)
    );

  // Bridge: capture export state for birthday view
  _lastAuditExport = {
    mode: 'birthday',
    campId: 'BDAY_LIST',
    month,
    agent: agentSel,
    rows: allRows,
  };

  const autoCount = finalRows.filter(d => d.source !== 'manual').length;
  const addedCount = finalRows.filter(d => d.source === 'manual').length;
  const removedCount = Object.values(overrides).filter(a => a === 'remove').length;
  const finalCount = finalRows.length;
  const monthLabel = auditBirthdayMonthLabel(month);
  const birthdayCampId = 'birthday_gift_auto';

  function birthdayClaimFor(d) {
    const exact = getClaim(month, d.agent || '', birthdayCampId, d.code);
    if (exact) return { claim: exact, keyAgent: d.agent || '' };
    const suffix = `|${birthdayCampId}|${(d.code || '').toUpperCase()}`;
    const foundKey = Object.keys(CLAIMS_CACHE).find(k => k.endsWith(suffix));
    if (!foundKey) return { claim: null, keyAgent: d.agent || '' };
    return { claim: CLAIMS_CACHE[foundKey], keyAgent: foundKey.split('|')[0] || d.agent || '' };
  }

  function birthdayAuditFor(d, keyAgent) {
    return getAudit(month, keyAgent || d.agent || '', birthdayCampId, d.code);
  }

  const birthdayStatusRows = allRows.map(d => {
    const { claim, keyAgent } = birthdayClaimFor(d);
    const audit = claim ? birthdayAuditFor(d, keyAgent) : null;
    return { ...d, claim, audit, keyAgent };
  });
  const claimedCount = birthdayStatusRows.filter(d => !!d.claim && d.claim.status !== 'excluded').length;
  const verifiedCount = birthdayStatusRows.filter(d => d.audit?.status === 'verified').length;
  const rejectedCount = birthdayStatusRows.filter(d => d.audit?.status === 'rejected').length;
  const pendingCount = Math.max(0, claimedCount - verifiedCount - rejectedCount);

  summaryEl.innerHTML = `
    <div class="sum-card"><div class="sum-val b">${autoCount}</div><div class="sum-lbl">Auto</div></div>
    <div class="sum-card"><div class="sum-val g">${claimedCount}</div><div class="sum-lbl">Claimed</div></div>
    <div class="sum-card"><div class="sum-val b">${verifiedCount}</div><div class="sum-lbl">Verified</div></div>
    <div class="sum-card"><div class="sum-val a">${pendingCount}</div><div class="sum-lbl">Pending Audit</div></div>
    <div class="sum-card"><div class="sum-val r">${removedCount}</div><div class="sum-lbl">Removed</div></div>`;

  const renderBirthdayRow = d => {
    const isRemoved = d.status === 'removed';
    const isAdded = d.status === 'added';
    const { claim, keyAgent } = birthdayClaimFor(d);
    const audit = claim ? birthdayAuditFor(d, keyAgent) : null;
    const statusClass = isRemoved ? 'pending'
      : !claim ? 'unclaimed'
      : audit?.status === 'verified' ? 'verified'
      : audit?.status === 'rejected' ? 'rejected'
      : 'claimed';
    const claimLabel = isRemoved ? 'REMOVED'
      : !claim ? 'NOT CLAIMED'
      : audit?.status === 'verified' ? 'VERIFIED'
      : audit?.status === 'rejected' ? 'REJECTED'
      : 'CLAIMED';
    const sourceBadge = isRemoved
      ? '<span class="claim-status pending" style="color:#aaa;background:rgba(255,255,255,.08);">REMOVED</span>'
      : isAdded
        ? '<span class="claim-status claimed" style="color:var(--accent);background:rgba(255,165,0,.12);">ADDED</span>'
        : '<span class="claim-status pending">AUTO</span>';
    const claimBadge = `<span class="claim-status ${statusClass}">${claimLabel}</span>`;
    const rowStyle = isRemoved ? 'opacity:.65;' : '';
    const nameStyle = isRemoved ? 'text-decoration:line-through;color:var(--muted);' : '';
    const claimMeta = !claim ? 'Gift not marked claimed yet'
      : `Gift marked: ${claim.ts || '-'}${claim.remark ? ' - "' + auditHtml(claim.remark) + '"' : ''}${audit?.status === 'verified' ? ' - Verified' : audit?.status === 'rejected' ? ' - Rejected' : ''}`;
    return `<div class="claim-row ${statusClass}" style="${rowStyle}">
      <div class="claim-info">
        <div class="claim-name" style="${nameStyle}">${auditHtml(d.name)}</div>
        <div class="claim-code">${auditHtml(d.code)} - ${auditHtml(d.agent || 'Unknown agent')}${d.type ? ' - ' + auditHtml(d.type) : ''}${d.phone ? ' - ' + auditHtml(d.phone) : ''}</div>
        <div class="claim-meta">${isRemoved ? 'Excluded by month-scoped birthday override' : isAdded ? 'Manually added in birthday overrides' : 'Auto-selected from birthday rules'} - ${claimMeta}</div>
      </div>
      <div class="claim-actions">
        ${sourceBadge}
        ${claimBadge}
        ${isRemoved
          ? `<button class="audit-btn verify" onclick="birthdayAuditAdd('${auditJs(month)}','${auditJs(d.code)}')">+ Add</button>`
          : `${claim ? (!audit ? `
            <button class="audit-btn verify" onclick="auditClaim('${auditJs(month)}','${auditJs(keyAgent || d.agent)}','${birthdayCampId}','${auditJs(d.code)}','verified')">OK</button>
            <button class="audit-btn reject" onclick="promptReject('${auditJs(month)}','${auditJs(keyAgent || d.agent)}','${birthdayCampId}','${auditJs(d.code)}')">Reject</button>
          ` : `
            <button class="audit-btn undo" onclick="auditClaim('${auditJs(month)}','${auditJs(keyAgent || d.agent)}','${birthdayCampId}','${auditJs(d.code)}','undo')">Undo</button>
          `) : ''}
          <button class="audit-btn reject" onclick="birthdayAuditRemove('${auditJs(month)}','${auditJs(d.code)}')">Remove</button>`}
      </div>
    </div>`;
  };

  const rowsByAgent = {};
  allRows.forEach(d => {
    const key = d.agent || 'Unknown agent';
    if (!rowsByAgent[key]) rowsByAgent[key] = [];
    rowsByAgent[key].push(d);
  });
  const rowsHtml = Object.entries(rowsByAgent)
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([agent, rows]) => {
      const agentClaimed = rows.filter(d => !!birthdayClaimFor(d).claim).length;
      return `<div class="agent-section is-collapsed">
      <div class="agent-hdr" onclick="toggleAgentSection(this)">
        <div>
          <div class="agent-name"><span class="agent-toggle">&gt;</span> ${auditHtml(agent)}</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;">
            ${rows.length} birthday debtors - ${agentClaimed}/${rows.length} claimed
          </div>
        </div>
        <div class="agent-stats">
          <span class="stat-chip done">${agentClaimed}/${rows.length} claimed</span>
          <span class="stat-chip done">${rows.length}</span>
        </div>
      </div>
      <div class="claims-body">${rows.map(renderBirthdayRow).join('')}</div>
    </div>`;
    }).join('');

  contentEl.innerHTML = `
    <div class="agent-section">
      <div class="agent-hdr" style="cursor:default;">
        <div>
          <div class="agent-name">Birthday ${auditHtml(monthLabel)}</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;">
            Auto: ${autoCount} + Added: ${addedCount} = ${finalCount} active. Claimed: ${claimedCount}. Verified: ${verifiedCount}. Removed: ${removedCount} separately.
          </div>
        </div>
        <div class="agent-stats">
          <button class="audit-btn verify" onclick="birthdayAuditAdd('${auditJs(month)}')">+ Add debtor</button>
        </div>
      </div>
      <div class="claims-body">${rowsHtml || `<div class="empty">No birthday debtors${agentSel !== 'ALL' ? ' for ' + auditHtml(agentSel) : ''}</div>`}</div>
    </div>`;
}

function toggleAgentSection(hdr) {
  const section = hdr.closest('.agent-section');
  if (!section) return;
  const collapsed = section.classList.toggle('is-collapsed');
  const icon = section.querySelector('.agent-toggle');
  if (icon) icon.textContent = collapsed ? '▸' : '▾';
}

function setAllAgentSections(expand) {
  document.querySelectorAll('.agent-section').forEach(section => {
    section.classList.toggle('is-collapsed', !expand);
    const icon = section.querySelector('.agent-toggle');
    if (icon) icon.textContent = expand ? '▾' : '▸';
  });
}

// ── Audit actions ──────────────────────────────────────────────────────────
async function auditClaim(month, agent, campId, debtorCode, action) {
  const now = new Date();
  const ts  = now.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  if (action === 'undo') {
    await saveAudit(month, agent, campId, debtorCode, {status:'undo', ts, by:'management'});
  } else {
    await saveAudit(month, agent, campId, debtorCode, {status:action, ts, by:'management'});
  }
  showToast(action==='verified'?'✓ Verified':action==='undo'?'Undo done':'✗ Rejected');
  renderAudit();
}

function promptReject(month, agent, campId, debtorCode) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:flex-end;justify-content:center;';
  overlay.innerHTML = `
    <div style="background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:480px;">
      <div style="font-family:var(--display);font-size:20px;color:var(--red);margin-bottom:12px;">✗ Reject Claim</div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;">Reason (required)</div>
      <input type="text" id="reject-reason" placeholder="e.g. No photo proof, wrong quantity, duplicate"
        style="width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--body);font-size:13px;padding:11px 12px;margin-bottom:14px;">
      <div style="display:flex;gap:10px;">
        <button onclick="confirmReject('${month}','${agent}','${campId}','${debtorCode}',this)"
          style="flex:1;background:rgba(255,95,95,.2);border:1px solid rgba(255,95,95,.4);color:var(--red);font-family:var(--mono);font-size:12px;font-weight:700;padding:12px;border-radius:10px;cursor:pointer;">
          ✗ CONFIRM REJECT
        </button>
        <button onclick="this.closest('div[style*=fixed]').remove()"
          style="flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:11px;padding:12px;border-radius:10px;cursor:pointer;">
          Cancel
        </button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
  setTimeout(()=>document.getElementById('reject-reason')?.focus(),100);
}

async function confirmReject(month, agent, campId, debtorCode, btn) {
  const reason = document.getElementById('reject-reason')?.value?.trim();
  if (!reason) { document.getElementById('reject-reason').style.borderColor='var(--red)'; return; }
  const now = new Date();
  const ts  = now.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  await saveAudit(month, agent, campId, debtorCode, {status:'rejected', reason, ts, by:'management'});
  btn.closest('div[style*=fixed]').remove();
  showToast('✗ Claim rejected');
  renderAudit();
}

// ── Bulk approve ───────────────────────────────────────────────────────────
// Batch UPDATE in Supabase: mark many pending claims as verified at once.
async function _bulkVerifyInSupabase(month, claimFilters) {
  // claimFilters: array of { agent, camp_id, debtor_code }
  if (!claimFilters.length) return { ok:0, fail:0 };

  const now = new Date();
  const ts  = now.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  // Try with audit metadata first; fall back to status-only if unsupported
  const bodyFull = { status:'verified', audit_ts: ts, audit_by: 'management' };
  const bodyMin  = { status:'verified' };

  let ok = 0, fail = 0;
  const BATCH = 50;  // PATCH via or() filter — keep URL manageable
  for (let i = 0; i < claimFilters.length; i += BATCH) {
    const slice = claimFilters.slice(i, i + BATCH);
    const conditions = slice.map(cf =>
      `and(agent.eq.${encodeURIComponent(cf.agent)},camp_id.eq.${encodeURIComponent(cf.camp_id)},debtor_code.eq.${encodeURIComponent(cf.debtor_code)})`
    ).join(',');
    const url = `${SUPABASE_URL}/rest/v1/claims?month=eq.${encodeURIComponent(month)}&status=eq.delivered&or=(${conditions})`;

    try {
      let r = await fetch(url, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(bodyFull)
      });
      // Fallback if audit columns don't exist yet
      if (!r.ok) {
        r = await fetch(url, {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(bodyMin)
        });
      }
      if (r.ok) {
        ok += slice.length;
        // Update in-memory cache
        slice.forEach(cf => {
          const key = `${cf.agent}|${cf.camp_id}|${cf.debtor_code.toUpperCase()}`;
          AUDIT_CACHE[key] = { status:'verified', ts, by:'management' };
        });
      } else {
        const err = await r.text();
        console.warn('[bulk-approve] batch failed', r.status, err);
        fail += slice.length;
      }
    } catch(e) {
      console.warn('[bulk-approve] network error', e);
      fail += slice.length;
    }
  }

  return { ok, fail };
}

// Approve all pending claims in the CURRENT VIEW (current campaign + agent filter)
async function bulkApproveAllPending() {
  const month     = document.getElementById('month-select').value;
  const agentSel  = document.getElementById('agent-select').value;
  const statusEl  = document.getElementById('bulk-approve-status');

  // Find all pending in the currently filtered view
  const pending = [];
  Object.keys(CLAIMS_CACHE).forEach(key => {
    const [agent, campId, debtorCode] = key.split('|');
    if (agentSel !== 'ALL' && agent !== agentSel) return;
    if (activeCampId !== 'ALL' && campId !== activeCampId) return;
    if (AUDIT_CACHE[key]) return;  // already audited
    if (CLAIMS_CACHE[key]?.status === 'excluded') return;  // agent-excluded, not admin's to approve
    pending.push({ agent, camp_id:campId, debtor_code:debtorCode });
  });

  if (!pending.length) {
    statusEl.textContent = 'No pending claims in current view';
    statusEl.style.color = 'var(--muted)';
    return;
  }

  if (!confirm(`Approve ALL ${pending.length} pending claims in current view?\n\nFilter: ${activeCampId==='ALL'?'All campaigns':activeCampId}, ${agentSel==='ALL'?'All agents':agentSel}\n\nThis will set status to "verified" in Supabase.`)) return;

  statusEl.textContent = `⏳ Approving ${pending.length} claims...`;
  statusEl.style.color = 'var(--accent)';

  const { ok, fail } = await _bulkVerifyInSupabase(month, pending);
  statusEl.textContent = `✓ ${ok} approved${fail?` · ✗ ${fail} failed`:''}`;
  statusEl.style.color = fail ? 'var(--red)' : 'var(--green)';
  renderAudit();
}

// Approve all pending claims for a specific agent (called from per-agent button)
async function bulkApproveAgent(agent) {
  const month    = document.getElementById('month-select').value;
  const statusEl = document.getElementById('bulk-approve-status');

  const pending = [];
  Object.keys(CLAIMS_CACHE).forEach(key => {
    const [a, campId, debtorCode] = key.split('|');
    if (a !== agent) return;
    if (activeCampId !== 'ALL' && campId !== activeCampId) return;
    if (AUDIT_CACHE[key]) return;
    if (CLAIMS_CACHE[key]?.status === 'excluded') return;  // skip agent-excluded
    pending.push({ agent:a, camp_id:campId, debtor_code:debtorCode });
  });

  if (!pending.length) {
    statusEl.textContent = `${agent}: no pending claims`;
    statusEl.style.color = 'var(--muted)';
    return;
  }

  if (!confirm(`Approve ${pending.length} pending claims for ${agent}?`)) return;

  statusEl.textContent = `⏳ ${agent}: approving ${pending.length}...`;
  statusEl.style.color = 'var(--accent)';

  const { ok, fail } = await _bulkVerifyInSupabase(month, pending);
  statusEl.textContent = `✓ ${agent}: ${ok} approved${fail?` · ✗ ${fail} failed`:''}`;
  statusEl.style.color = fail ? 'var(--red)' : 'var(--green)';
  renderAudit();
}

// Approve all pending claims for a specific campaign (prompts for campaign)
async function bulkApproveByCampaign() {
  const month    = document.getElementById('month-select').value;
  const statusEl = document.getElementById('bulk-approve-status');
  const camps    = (CAMP_DATA?.campaigns || []).filter(c => isCampaignActiveInMonth(c, month));

  // Build picker
  const campOptions = camps.map(c => {
    const cnt = Object.keys(CLAIMS_CACHE).filter(k => {
      const [,campId] = k.split('|');
      return campId === c.id && !AUDIT_CACHE[k] && CLAIMS_CACHE[k]?.status !== 'excluded';
    }).length;
    return { id: c.id, name: c.name, pending: cnt };
  }).filter(o => o.pending > 0);

  if (!campOptions.length) {
    statusEl.textContent = 'No pending claims across any campaign';
    statusEl.style.color = 'var(--muted)';
    return;
  }

  const picked = prompt(
    'Approve all pending for which campaign?\n\n' +
    campOptions.map((o, i) => `${i+1}. ${o.name} (${o.pending} pending)`).join('\n') +
    '\n\nType the number:'
  );
  const idx = parseInt(picked, 10) - 1;
  if (isNaN(idx) || idx < 0 || idx >= campOptions.length) return;

  const chosen = campOptions[idx];
  if (!confirm(`Approve ALL ${chosen.pending} pending claims for "${chosen.name}"?`)) return;

  const pending = [];
  Object.keys(CLAIMS_CACHE).forEach(key => {
    const [agent, campId, debtorCode] = key.split('|');
    if (campId !== chosen.id) return;
    if (AUDIT_CACHE[key]) return;
    if (CLAIMS_CACHE[key]?.status === 'excluded') return;
    pending.push({ agent, camp_id:campId, debtor_code:debtorCode });
  });

  statusEl.textContent = `⏳ Approving ${pending.length} for ${chosen.name}...`;
  statusEl.style.color = 'var(--accent)';

  const { ok, fail } = await _bulkVerifyInSupabase(month, pending);
  statusEl.textContent = `✓ ${chosen.name}: ${ok} approved${fail?` · ✗ ${fail} failed`:''}`;
  statusEl.style.color = fail ? 'var(--red)' : 'var(--green)';
  renderAudit();
}

// ── Export CSV ─────────────────────────────────────────────────────────────
// Iterates CLAIMS_CACHE (Supabase) so bulk-imported claims are included
function exportAuditCSV() {
  const month    = document.getElementById('month-select').value;
  const agentSel = document.getElementById('agent-select').value;
  const allCamps = CAMP_DATA?.campaigns||[];
  const rows     = [['Month','Agent','Debtor Code','Debtor Name','Campaign','Type','CAT','Claim Status','Claim Time','Bulk','Remark','Audit Status','Audit Time','Reject Reason']];

  // Build debtor lookup for company names
  const debtorByAgentCode = {};
  AGENTS.forEach(a => {
    const list = DASH_DATA?.agents?.[a]?.debtor_cards?.debtors || [];
    list.forEach(d => { debtorByAgentCode[`${a}|${(d.debtor_code||'').toUpperCase()}`] = d; });
  });

  Object.entries(CLAIMS_CACHE).forEach(([key, claim]) => {
    const [agent, campId, debtorCode] = key.split('|');
    if (agentSel !== 'ALL' && agent !== agentSel) return;
    if (activeCampId !== 'ALL' && campId !== activeCampId) return;

    const camp = allCamps.find(c => c.id === campId) || { name: campId, type: 'other' };
    const debtor = debtorByAgentCode[`${agent}|${debtorCode}`] || { debtor_code: debtorCode, company_name: debtorCode, campaigns: [] };
    const campEntry = (debtor.campaigns||[]).find(c => c.id === campId) || {};
    const audit = getAudit(month, agent, campId, debtorCode);

    rows.push([
      month, agent,
      debtorCode, (debtor.company_name||'').replace(/,/g,''),
      (camp.name||'').replace(/,/g,''),
      CAMP_LABEL[camp.type] || camp.type || '',
      campEntry.cat || '',
      'Claimed',
      claim.ts || '',
      claim.bulk ? 'Yes' : 'No',
      (claim.remark||'').replace(/,/g,''),
      audit?.status || 'pending',
      audit?.ts || '',
      (audit?.reason||'').replace(/,/g,''),
    ]);
  });

  const csv  = rows.map(r=>r.join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `campaign_audit_${month.replace(' ','')}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── Bulk Mark Delivered ────────────────────────────────────────────────────
function exportAuditExcel() {
  if (typeof XLSX === 'undefined') {
    alert('Excel export library not loaded yet. Try again in a moment.');
    return;
  }
  if (!_lastAuditExport || !_lastAuditExport.rows || !_lastAuditExport.rows.length) {
    alert('No data to export. Select a campaign tab with rows.');
    return;
  }

  const { mode, campId, month, agent, rows } = _lastAuditExport;
  const wb = XLSX.utils.book_new();

  if (mode === 'birthday') {
    const exportRows = rows.map(d => ({
      'Code': d.code || '',
      'Name': d.name || '',
      'Agent': d.agent || '',
      'Type': d.type || '',
      'Phone': d.phone || '',
      'Source': d.status === 'removed' ? 'Removed' : d.source === 'manual' ? 'Manual Add' : 'Auto',
    }));
    const ws = XLSX.utils.json_to_sheet(exportRows);
    ws['!cols'] = [{wch:14},{wch:35},{wch:10},{wch:16},{wch:14},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws, `Birthday ${month||''}`.slice(0,31));
  } else {
    const exportRows = rows.map(r => ({
      'Campaign': r.camp_name || r.campaign || campId || '',
      'Code': r.debtor_code || r.code || '',
      'Name': r.debtor_name || r.name || '',
      'Agent': r.agent || '',
      'Status': r.status || '',
      'Claimed Date': r.claimed_at || r.timestamp || '',
      'Verified By': r.verified_by || '',
      'Remark': r.remark || '',
    }));
    const ws = XLSX.utils.json_to_sheet(exportRows);
    ws['!cols'] = [{wch:30},{wch:14},{wch:30},{wch:10},{wch:12},{wch:18},{wch:14},{wch:30}];
    let sheetName = `Audit ${campId || 'ALL'}`.replace(/[:\\\/\?\*\[\]]/g, '_');
    if (sheetName.length > 31) sheetName = sheetName.slice(0,28) + '...';
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  }

  const today = new Date().toISOString().slice(0,10);

function doRestoreClaims(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const claims = JSON.parse(e.target.result);
      let count = 0;
      Object.entries(claims).forEach(([k, v]) => {
        if (k.startsWith('camp_claim_')) {
          localStorage.setItem(k, JSON.stringify(v));
          count++;
        }
      });
      showToast(`✓ ${count} claims restored`);
      renderAudit();
    } catch(err) {
      showToast('❌ Invalid backup file');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function handleBulkFile(input) {
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('bulk-file-status');

  if (file.name.endsWith('.csv')) {
    const reader = new FileReader();
    reader.onload = e => {
      const lines = e.target.result.split('\n');
      const header = lines[0].toLowerCase().split(',');
      const codeCol = header.findIndex(h => h.includes('code') || h.includes('debtor'));
      if (codeCol < 0) { statusEl.textContent = '❌ No "Code" or "Debtor Code" column found'; statusEl.style.color='var(--red)'; statusEl.style.display='block'; return; }
      const codes = lines.slice(1).map(l => l.split(',')[codeCol]?.trim()).filter(Boolean);
      applyBulkCodes(codes, file.name, statusEl);
    };
    reader.readAsText(file);
  } else if (file.name.endsWith('.xlsx')) {
    // Use SheetJS if available
    if (typeof XLSX !== 'undefined') {
      const reader = new FileReader();
      reader.onload = e => {
        const wb = XLSX.read(e.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
        const codeKey = Object.keys(rows[0]||{}).find(k => k.toLowerCase().includes('code') || k.toLowerCase().includes('debtor'));
        if (!codeKey) { statusEl.textContent = '❌ No "Code" or "Debtor Code" column found'; statusEl.style.color='var(--red)'; statusEl.style.display='block'; return; }
        const codes = rows.map(r => String(r[codeKey]||'').trim()).filter(Boolean);
        applyBulkCodes(codes, file.name, statusEl);
      };
      reader.readAsBinaryString(file);
    } else {
      statusEl.textContent = '⚠ SheetJS not loaded — use CSV format instead';
      statusEl.style.color = 'var(--gold)';
      statusEl.style.display = 'block';
    }
  }
}

function applyBulkCodes(codes, filename, statusEl) {
  // Match uploaded codes against debtor list and auto-check them
  const checkboxes = document.querySelectorAll('.bulk-check:not([disabled])');
  let matched = 0;
  checkboxes.forEach(cb => {
    if (codes.includes(cb.value)) {
      cb.checked = true;
      matched++;
    }
  });
  statusEl.textContent = `✓ ${filename}: ${codes.length} codes loaded, ${matched} matched and selected`;
  statusEl.style.color = matched > 0 ? 'var(--green)' : 'var(--gold)';
  statusEl.style.display = 'block';
}
